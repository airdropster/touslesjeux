services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: touslesjeux
      POSTGRES_USER: touslesjeux
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U touslesjeux"]
      interval: 5s
      retries: 5

volumes:
  pgdata_dev:
